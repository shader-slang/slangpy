name: ci-benchmark

on:
  schedule:
    - cron: '0 */4 * * *' # run every 4 hours
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  id-token: write

jobs:
  build:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows, linux]
        config: [Release]
        python: ["3.10"]
        include:
          # Builds running on self-hosted runners
          - { os: windows, platform: x86_64, compiler: msvc, config: Release, flags: "benchmark", runs-on: { labels: [Windows, X64, nvrgfx-perf-kernelvm-bridge] } }
          - { os: linux, platform: x86_64, compiler: gcc, config: Release, flags: "benchmark", runs-on: { labels: [Linux, X64, nvrgfx-perf-kernelvm-bridge] } }

    env:
      # Environment variables used by ci.py
      CI_OS: ${{ matrix.os }}
      CI_PLATFORM: ${{ matrix.platform }}
      CI_COMPILER: ${{ matrix.compiler }}
      CI_CONFIG: ${{ matrix.config }}
      CI_PYTHON: ${{ matrix.python }}
      CI_FLAGS: ${{ matrix.flags }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          lfs: true

      - name: Cleanup submodules # Fix for https://github.com/actions/checkout/issues/358
        run: |
          git submodule foreach --recursive git clean -ffdx
          git submodule foreach --recursive git reset --hard

      # Setup Linux.
      - name: Setup Linux
        if: startsWith(matrix.os, 'linux') && contains(matrix.runs-on, 'ubuntu-')
        run: |
          sudo apt update && sudo apt install -y libxinerama-dev libxcursor-dev xorg-dev libglu1-mesa-dev pkg-config

      # Setup Python.
      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      # Setup Python environment.
      - name: Setup Python environment
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install -r samples/requirements.txt
          python -m pip install pytest-github-actions-annotate-failures

      # Setup PyTorch environment
      - name: Setup PyTorch environment
        if: runner.os != 'macos' && contains(matrix.flags, 'unit-test')
        run: |
          python -m pip install torch==2.8.0 torchvision torchaudio --index-url https://download.pytorch.org/whl/cu128

      # Setup MSVC.
      - name: Setup MSVC
        uses: step-security/msvc-dev-cmd@v1

      # Setup CMake/Ninja.
      - name: Setup CMake/Ninja
        uses: lukka/get-cmake@latest

      # DNI (do-not-integrate): build Slang from the __grid_constant__ const-ref fix.
      # Under test: shader-slang/slang @ haaggarwal/cuda-grid-constant-uniform (commit 9dccfd65),
      # based on the floor (#11939 @9586d17f) plus the CUDA emit change that marks entry-point
      # by-value uniform aggregates `__grid_constant__ const` and forwards their address into
      # borrow-in callees, removing the per-thread .local depot copy. No by-ref ABI move, no
      # device<->host memcpy, no slang-rhi bump. SGL_LOCAL_SLANG swaps only the compiler.
      - name: Build Slang (__grid_constant__ const-ref fix — DNI)
        run: |
          git clone --recursive -b haaggarwal/grid-constant-diag-A2 https://github.com/shader-slang/slang.git
          cd slang
          git submodule update --init --recursive
          mkdir build
          cmake -B build --preset default
          cmake --build build --config ${{ matrix.config }} --parallel

      # Setup.
      - name: Setup
        run: python tools/ci.py setup

      # Setup vcpkg caching.
      # Only run on hosted runners.
      # For self-hosted runners, we use a local cache directory.
      - name: Set vcpkg cache directory
        if: startsWith(matrix.runs-on, 'ubuntu-') || startsWith(matrix.runs-on, 'macos-') || startsWith(matrix.runs-on, 'windows-')
        run: |
          echo "VCPKG_DEFAULT_BINARY_CACHE=${{ github.workspace }}/vcpkg-cache" >> $GITHUB_ENV
          mkdir -p ${{ github.workspace }}/vcpkg-cache
      - name: Setup vcpkg caching
        if: startsWith(matrix.runs-on, 'ubuntu-') || startsWith(matrix.runs-on, 'macos-') || startsWith(matrix.runs-on, 'windows-')
        uses: actions/cache@v5
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-cache-${{ runner.os }}-${{ matrix.platform }}-${{ matrix.compiler }}-${{ hashFiles('vcpkg.json', 'external/vcpkg-triplets/**') }}

      # Configure.
      # DNI: point SlangPy at the locally-built grid_constant-fix Slang. SGL_LOCAL_SLANG swaps
      # only the compiler; SlangPy keeps its own external/slang-rhi (SGL_LOCAL_RHI stays OFF).
      - name: Configure
        run: python tools/ci.py --cmake-args="-DSGL_LOCAL_SLANG=ON -DSGL_LOCAL_SLANG_DIR=slang -DSGL_LOCAL_SLANG_BUILD_DIR=build/${{ matrix.config }}" configure

      # Build.
      - name: Build
        run: python tools/ci.py build

      # Benchmark (Python) — DNI: run pytest directly with --benchmark-save instead of the Mongo
      # upload path. The nvr-ci Mongo host is not resolvable from these runners (getaddrinfo
      # failures) and the upload exception aborts pytest before the terminal-summary table prints,
      # silently losing all numbers. Saving to local JSON makes the run self-contained: the
      # Name/Min/Max/Mean/Median/Stddev table always prints to the log, and the JSON is uploaded as
      # an artifact. Windows self-hosted runners have no bash — use pwsh; each pytest is wrapped so
      # one device's failure never aborts the step, and the always()-gated unlock below guarantees
      # the shared runner's clocks are released.
      - name: Benchmark (Python, Windows, GPU Clock Locked)
        if: contains(matrix.flags, 'benchmark') && runner.os == 'Windows'
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          python tools/gpu_clock.py lock --ratio 0.7
          python -m pytest slangpy/benchmarks -ra --device-types cuda --benchmark-save "dni-$env:RUN_ID-cuda"; $global:LASTEXITCODE = 0
          python -m pytest slangpy/benchmarks -ra --device-types vulkan --benchmark-save "dni-$env:RUN_ID-vulkan"; $global:LASTEXITCODE = 0
          python -m pytest slangpy/benchmarks -ra --device-types d3d12 --benchmark-save "dni-$env:RUN_ID-d3d12"; $global:LASTEXITCODE = 0
        shell: pwsh

      # Safety net: always release the GPU clocks on the shared self-hosted runner, even if the
      # benchmark step aborted — otherwise the clocks stay pinned and corrupt subsequent jobs.
      - name: Unlock GPU clocks (Windows)
        if: contains(matrix.flags, 'benchmark') && runner.os == 'Windows' && always()
        run: python tools/gpu_clock.py unlock
        shell: pwsh

      - name: Benchmark (Python, Linux, GPU Clock Unlocked)
        if: contains(matrix.flags, 'benchmark') && runner.os == 'Linux'
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          python -m pytest slangpy/benchmarks -ra --device-types cuda --benchmark-save "dni-${RUN_ID}-cuda" || true
          python -m pytest slangpy/benchmarks -ra --device-types vulkan --benchmark-save "dni-${RUN_ID}-vulkan" || true
        shell: bash

      # Upload the saved benchmark JSON(s) so the medians survive even if the log is trimmed.
      - name: Upload benchmark reports
        if: contains(matrix.flags, 'benchmark') && always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reports-${{ matrix.os }}
          path: .benchmarks/**/*.json
          if-no-files-found: warn
