name: Build and test SlangPy with Slang
description: Checks out SlangPy, builds Slang from source, builds SlangPy against it, and runs tests.

inputs:
  os:
    required: true
  platform:
    required: true
  compiler:
    required: true
  config:
    required: true
  python:
    required: true
  flags:
    required: true
  slang-checkout-mode:
    description: "'branch' for nightly/manual, 'pr' for repository_dispatch"
    required: true
  slang-branch:
    description: "Slang branch to checkout (branch mode)"
    default: "master"
  slang-pr-number:
    description: "Slang PR number to checkout (pr mode)"
    default: ""
  slang-ref:
    description: "Slang ref to checkout (ref mode)"
    default: ""
  slang-repo:
    description: "Slang repository to clone for ref mode"
    default: "shader-slang/slang"
  shell:
    description: "Shell to use for run steps (bash on Linux/macOS, pwsh on Windows)"
    required: true

runs:
  using: composite
  steps:
    - name: Cleanup submodules # Fix for https://github.com/actions/checkout/issues/358
      shell: ${{ inputs.shell }}
      run: |
        git submodule foreach --recursive git clean -ffdx
        git submodule foreach --recursive git reset --hard

    # Setup Linux.
    - name: Setup Linux
      if: startsWith(inputs.os, 'linux')
      shell: bash
      run: |
        sudo apt update && sudo apt install -y libxinerama-dev libxcursor-dev xorg-dev libglu1-mesa-dev pkg-config

    # Setup Python.
    - name: Setup Python ${{ inputs.python }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python }}

    # Setup Python environment.
    - name: Setup Python environment
      shell: ${{ inputs.shell }}
      run: |
        python -m pip install -r requirements-dev.txt
        python -m pip install -r samples/requirements.txt
        python -m pip install pytest-github-actions-annotate-failures

    # Setup PyTorch environment
    - name: Setup PyTorch environment
      if: runner.os != 'macos' && contains(inputs.flags, 'unit-test')
      shell: ${{ inputs.shell }}
      run: |
        python -m pip install torch==2.8.0 torchvision torchaudio --index-url https://download.pytorch.org/whl/cu128

    # Setup MSVC.
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    # Setup CMake/Ninja.
    - name: Setup CMake/Ninja
      uses: lukka/get-cmake@latest

    # Checkout Slang (branch mode).
    - name: Checkout Slang
      if: inputs.slang-checkout-mode == 'branch'
      shell: ${{ inputs.shell }}
      run: |
        git clone --recursive https://github.com/shader-slang/slang.git
        cd slang
        git checkout ${{ inputs.slang-branch }}
        git submodule update --init --recursive

    # Checkout Slang (PR mode).
    - name: Checkout Slang (PR)
      if: inputs.slang-checkout-mode == 'pr'
      shell: ${{ inputs.shell }}
      run: |
        git clone https://github.com/shader-slang/slang.git
        cd slang
        git fetch origin pull/${{ inputs.slang-pr-number }}/head
        git checkout FETCH_HEAD
        git submodule update --init --recursive

    - name: Checkout Slang (ref)
      if: inputs.slang-checkout-mode == 'ref'
      shell: ${{ inputs.shell }}
      run: |
        git clone https://github.com/${{ inputs.slang-repo }}.git slang
        cd slang
        git fetch origin ${{ inputs.slang-ref }}
        git checkout FETCH_HEAD
        git submodule update --init --recursive

    # Build Slang.
    - name: Build Slang
      shell: ${{ inputs.shell }}
      run: |
        cd slang
        mkdir build
        cmake -B build --preset default
        cmake --build build --config ${{ inputs.config }} --parallel

    # Setup.
    - name: Setup
      shell: ${{ inputs.shell }}
      run: python tools/ci.py setup

    # Setup vcpkg caching (GitHub-hosted runners only).
    # For self-hosted runners, a local cache directory is used.
    - name: Set vcpkg cache directory
      if: runner.environment == 'github-hosted'
      shell: bash
      run: |
        echo "VCPKG_DEFAULT_BINARY_CACHE=${{ github.workspace }}/vcpkg-cache" >> $GITHUB_ENV
        mkdir -p ${{ github.workspace }}/vcpkg-cache
    - name: Setup vcpkg caching
      if: runner.environment == 'github-hosted'
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg-cache
        key: vcpkg-cache-${{ runner.os }}-${{ inputs.platform }}-${{ inputs.compiler }}-${{ hashFiles('vcpkg.json', 'external/vcpkg-triplets/**') }}

    # Configure.
    - name: Configure
      shell: ${{ inputs.shell }}
      run: python tools/ci.py --cmake-args="-DSGL_LOCAL_SLANG=ON -DSGL_LOCAL_SLANG_DIR=slang -DSGL_LOCAL_SLANG_BUILD_DIR=build/${{ inputs.config }}" configure

    # Build.
    - name: Build
      shell: ${{ inputs.shell }}
      run: python tools/ci.py build

    # Install slangpy-torch extension (requires MSVC on Windows, PyTorch installed)
    - name: Install slangpy-torch
      if: runner.os != 'macos' && contains(inputs.flags, 'unit-test')
      shell: ${{ inputs.shell }}
      run: python tools/ci.py install-slangpy-torch

    # Typing Checks (Python)
    - name: Typing Checks (Python)
      shell: ${{ inputs.shell }}
      run: python tools/ci.py typing-check-python

    # Unit Tests (C++)
    - name: Unit Tests (C++)
      if: contains(inputs.flags, 'unit-test')
      shell: ${{ inputs.shell }}
      run: python tools/ci.py unit-test-cpp

    # Unit Tests (Python)
    - name: Unit Tests (Python)
      if: contains(inputs.flags, 'unit-test')
      shell: ${{ inputs.shell }}
      run: python tools/ci.py unit-test-python --parallel

    # Slang integration tests (slangpy-based tests maintained in the slang repo)
    - name: Detect slang integration tests
      id: detect-slang-integration
      if: contains(inputs.flags, 'unit-test')
      shell: ${{ inputs.shell }}
      run: python -c "import pathlib, os; f=open(os.environ['GITHUB_OUTPUT'],'a'); f.write('has_tests=true\n' if pathlib.Path('slang/tests/integration/slangpy').is_dir() else 'has_tests=false\n'); f.close()"

    - name: Slang integration diagnostics (Windows)
      if: steps.detect-slang-integration.outputs.has_tests == 'true' && startsWith(inputs.os, 'windows')
      shell: ${{ inputs.shell }}
      env:
        NEURAL_MODULE_PATH: ${{ github.workspace }}/slang/build/${{ inputs.config }}/bin
      run: |
        @'
        import json
        import os
        import pathlib
        import subprocess

        print("=== neural-ci-diagnostics-windows ===", flush=True)

        for key in ["NEURAL_MODULE_PATH", "CUDA_PATH", "CUDA_HOME", "CUDA_ROOT"]:
            print(f"{key}={os.environ.get(key)}", flush=True)

        path_entries = [p for p in os.environ.get("PATH", "").split(os.pathsep) if "cuda" in p.lower() or "nvidia" in p.lower()]
        print("PATH_cuda_entries=" + json.dumps(path_entries), flush=True)

        p = pathlib.Path(os.environ["NEURAL_MODULE_PATH"])
        print(f"neural_module_path_input={p}", flush=True)
        print(f"neural_module_path_exists={p.exists()}", flush=True)
        try:
            print(f"neural_module_path_resolved={p.resolve()}", flush=True)
        except Exception as exc:
            print(f"neural_module_path_resolve_error={type(exc).__name__}: {exc}", flush=True)

        if p.exists():
            entries = sorted([x.name for x in p.iterdir()])
            print("neural_module_path_entries=" + json.dumps(entries[:100]), flush=True)
            std_dirs = [x for x in p.iterdir() if x.is_dir() and x.name.startswith("slang-standard-module-")]
            print("std_module_dirs=" + json.dumps([x.name for x in std_dirs]), flush=True)
            for d in std_dirs[:10]:
                inner = d / "slang"
                print(f"std_module_dir={d}", flush=True)
                print(f"std_module_slang_dir_exists={inner.exists()} path={inner}", flush=True)
                if inner.exists():
                    neural_slang = inner / "neural.slang"
                    neural_module = inner / "neural.slang-module"
                    print(f"neural_slang_exists={neural_slang.exists()} path={neural_slang}", flush=True)
                    print(f"neural_slang_module_exists={neural_module.exists()} path={neural_module}", flush=True)

        def run_cmd(label, cmd):
            print(f"=== {label} ===", flush=True)
            try:
                result = subprocess.run(cmd, capture_output=True, text=True, shell=False)
                print(f"returncode={result.returncode}", flush=True)
                if result.stdout:
                    print(result.stdout, flush=True)
                if result.stderr:
                    print("stderr:", flush=True)
                    print(result.stderr, flush=True)
            except Exception as exc:
                print(f"command_error={type(exc).__name__}: {exc}", flush=True)

        run_cmd("where nvcc", ["where", "nvcc"])
        run_cmd("where nvrtc64_*.dll", ["where", "nvrtc64_*.dll"])
        run_cmd("nvcc --version", ["nvcc", "--version"])

        if os.environ.get("CUDA_PATH"):
            cuda_bin = pathlib.Path(os.environ["CUDA_PATH"]) / "bin"
            print("cuda_bin_entries=" + json.dumps(sorted([x.name for x in cuda_bin.glob("nvrtc64*.dll")])), flush=True)
        '@ | Set-Content "$env:RUNNER_TEMP\neural_ci_diag.py"
        python "$env:RUNNER_TEMP\neural_ci_diag.py"

    - name: Slang integration diagnostics (Linux/macOS)
      if: steps.detect-slang-integration.outputs.has_tests == 'true' && !startsWith(inputs.os, 'windows')
      shell: ${{ inputs.shell }}
      env:
        NEURAL_MODULE_PATH: ${{ github.workspace }}/slang/build/${{ inputs.config }}/lib
      run: |
        python - <<'PY'
        import json
        import os
        import pathlib
        import subprocess

        print("=== neural-ci-diagnostics-posix ===", flush=True)

        for key in ["NEURAL_MODULE_PATH", "CUDA_PATH", "CUDA_HOME", "CUDA_ROOT", "LD_LIBRARY_PATH"]:
            print(f"{key}={os.environ.get(key)}", flush=True)

        path_entries = [p for p in os.environ.get("PATH", "").split(os.pathsep) if "cuda" in p.lower() or "nvidia" in p.lower()]
        print("PATH_cuda_entries=" + json.dumps(path_entries), flush=True)

        p = pathlib.Path(os.environ["NEURAL_MODULE_PATH"])
        print(f"neural_module_path_input={p}", flush=True)
        print(f"neural_module_path_exists={p.exists()}", flush=True)
        try:
            print(f"neural_module_path_resolved={p.resolve()}", flush=True)
        except Exception as exc:
            print(f"neural_module_path_resolve_error={type(exc).__name__}: {exc}", flush=True)

        if p.exists():
            entries = sorted([x.name for x in p.iterdir()])
            print("neural_module_path_entries=" + json.dumps(entries[:100]), flush=True)
            std_dirs = [x for x in p.iterdir() if x.is_dir() and x.name.startswith("slang-standard-module-")]
            print("std_module_dirs=" + json.dumps([x.name for x in std_dirs]), flush=True)
            for d in std_dirs[:10]:
                inner = d / "slang"
                print(f"std_module_dir={d}", flush=True)
                print(f"std_module_slang_dir_exists={inner.exists()} path={inner}", flush=True)
                if inner.exists():
                    neural_slang = inner / "neural.slang"
                    neural_module = inner / "neural.slang-module"
                    print(f"neural_slang_exists={neural_slang.exists()} path={neural_slang}", flush=True)
                    print(f"neural_slang_module_exists={neural_module.exists()} path={neural_module}", flush=True)

        def run_cmd(label, cmd):
            print(f"=== {label} ===", flush=True)
            try:
                result = subprocess.run(cmd, capture_output=True, text=True, shell=False)
                print(f"returncode={result.returncode}", flush=True)
                if result.stdout:
                    print(result.stdout, flush=True)
                if result.stderr:
                    print("stderr:", flush=True)
                    print(result.stderr, flush=True)
            except Exception as exc:
                print(f"command_error={type(exc).__name__}: {exc}", flush=True)

        run_cmd("which nvcc", ["which", "nvcc"])
        run_cmd("nvcc --version", ["nvcc", "--version"])
        run_cmd("bash -lc ls /usr/local/cuda*/lib64/libnvrtc*", ["bash", "-lc", "ls /usr/local/cuda*/lib64/libnvrtc* 2>/dev/null || true"])
        run_cmd("bash -lc ls /usr/lib*/libnvrtc*", ["bash", "-lc", "ls /usr/lib*/libnvrtc* 2>/dev/null || true"])
        PY

    - name: Slang integration tests
      if: steps.detect-slang-integration.outputs.has_tests == 'true' && startsWith(inputs.os, 'windows')
      shell: ${{ inputs.shell }}
      env:
        NEURAL_MODULE_PATH: ${{ github.workspace }}/slang/build/${{ inputs.config }}/bin
      run: |
        python -m pip install Pillow
        python -m pytest slang/tests/integration/slangpy/ -ra -v

    # Test Examples
    - name: Test Examples
      if: contains(inputs.flags, 'test-examples')
      shell: ${{ inputs.shell }}
      run: python tools/ci.py test-examples -p

    # Upload Crashpad Reports
    - name: Upload Crashpad Reports
      if: always() && contains(inputs.flags, 'crashpad')
      uses: actions/upload-artifact@v4
      with:
        name: crash-reports-${{ inputs.os }}-${{ inputs.platform }}-${{ inputs.compiler }}-${{ inputs.config }}
        path: .crashpad/reports/
        if-no-files-found: ignore

    # Generate Coverage Report
    - name: Generate Coverage Report
      if: contains(inputs.flags, 'coverage')
      shell: ${{ inputs.shell }}
      run: python tools/ci.py coverage-report

    # Coverage Report
    - name: Coverage Report
      uses: actions/upload-artifact@v4
      if: contains(inputs.flags, 'coverage')
      with:
        name: coverage-report
        path: reports/coverage.html

    # Cleanup slangpy-torch
    - name: Uninstall slangpy-torch
      if: always()
      shell: ${{ inputs.shell }}
      run: python -m pip uninstall slangpy-torch -y
      continue-on-error: true
